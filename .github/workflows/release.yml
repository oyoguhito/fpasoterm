name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v1.0.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  source:
    name: Source artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_ENV}"

      - name: Run checks
        run: npm run check

      - name: Scan for credentials
        run: npm run scan:secrets

      - name: Validate desktop file
        run: desktop-file-validate extra/linux/io.github.oyoguhito.fpasoterm.desktop

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Build source artifacts
        run: npm run build:artifacts -- --source-only

      - name: Upload source artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fpasoterm-source
          path: artifacts/*
          if-no-files-found: error

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-latest
          - label: linux-arm64
            os: ubuntu-24.04-arm
          - label: macos-x64
            os: macos-15-intel
          - label: macos-arm64
            os: macos-latest
          - label: windows-x64
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "tag ${RELEASE_TAG} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Run checks
        run: npm run check

      - name: Build platform artifacts
        run: npm run build:artifacts -- --bundles-only
        env:
          FPASOTERM_ARTIFACT_LABEL: ${{ matrix.label }}

      - name: Verify macOS bundles
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' app; do
            codesign --verify --deep --strict --verbose=2 "${app}"
            codesign --display --verbose=2 "${app}"
          done < <(find src-tauri/target/release/bundle/macos -name '*.app' -print0)
          while IFS= read -r -d '' dmg; do
            hdiutil verify "${dmg}"
          done < <(find artifacts -name '*.dmg' -print0)

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v6
        with:
          name: fpasoterm-${{ matrix.label }}
          path: artifacts/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - source
      - build

    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${GITHUB_RUN_ID}" --repo "${GITHUB_REPOSITORY}" --dir release-artifacts

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${{ inputs.tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi
          mapfile -d '' ASSETS < <(find release-artifacts -type f -print0)
          printf '%s\n' "${ASSETS[@]}"
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" "${ASSETS[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --verify-tag
          fi
