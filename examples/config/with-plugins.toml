# fpasoterm config example with TypeScript plugins enabled.
# The plugin paths are relative to ~/.config/fpasoterm/User/.

[window]
title = "fpasoterm plugins"
width = 1200
height = 760
titlebarColor = "#1565c0"

[terminal]
fontSize = 15
backgroundOpacity = 0.8
scrollback = 3000
termName = "xterm-256color"
# Leave empty for the platform default shell.
# Windows examples: "powershell.exe", "pwsh.exe", or "cmd.exe".
shell = ""

[terminal.theme]
background = "rgba(16, 19, 23, 0.80)"
foreground = "#e8edf2"
cursor = "#f5d76e"

[ime]
duplicateGuard = true
duplicateWindowMs = 900
repeatedTextWindowMs = 180

[plugins]
enabled = [
  "plugins/hello.ts",
  "plugins/theme.ts",
]
