# fpasoterm config example with TypeScript plugins enabled.
# The plugin paths are relative to ~/.config/fpasoterm/User/.

[window]
width = 1200
height = 760

[terminal]
fontSize = 15
scrollback = 3000

[terminal.theme]
background = "rgba(16, 19, 23, 0.80)"
foreground = "#e8edf2"
cursor = "#f5d76e"

[ime]
duplicateGuard = true
duplicateWindowMs = 900
repeatedTextWindowMs = 180

[plugins]
enabled = [
  "plugins/hello.ts",
  "plugins/theme.ts",
]
